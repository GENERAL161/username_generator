<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Koy Store - مولد رباعي ديسكورد</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      text-align: center;
    }

    .topbar {
      background: #111827;
      padding: 20px;
      border-bottom: 2px solid #22c55e;
    }

    .topbar h1 {
      margin: 0;
      font-size: 30px;
    }

    .topbar p {
      margin-top: 10px;
      color: #cbd5e1;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      background: #22c55e;
      padding: 10px 16px;
      border-radius: 10px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      padding: 40px 20px;
    }

    select, button {
      background: white;
      color: black;
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 16px;
      margin: 10px;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .results-box {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .name-card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 22px;
      font-weight: bold;
      min-width: 100px;
    }

    .note {
      margin-top: 15px;
      color: #94a3b8;
      font-size: 14px;
    }

    .footer {
      margin-top: 50px;
      padding: 20px;
      background: #111827;
      color: #94a3b8;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>🛒 Koy Store</h1>
    <p>مولد يوزرات ديسكورد الرباعية</p>
    <a href="https://discord.gg/Koy" target="_blank" class="btn">🚀 دخول سيرفرنا</a>
  </div>

  <div class="container">
    <h2>مولد رباعي لديسكورد</h2>

    <select id="mode">
      <option value="plain">4 أحرف بدون رمز</option>
      <option value="dot">3 أحرف + .</option>
      <option value="underscore">3 أحرف + _</option>
    </select>

    <button onclick="generateNames()">توليد</button>

    <div class="note">
      إذا اخترت النقطة أو الشرطة السفلية، يصير الاسم 3 أحرف + الرمز = 4 خانات
    </div>

    <div class="results-box" id="results"></div>
  </div>

  <div class="footer">
    © 2026 Koy Store - All Rights Reserved
  </div>

  <script>
    const chars = "abcdefghijklmnopqrstuvwxyz0123456789";

    function randomChar() {
      return chars[Math.floor(Math.random() * chars.length)];
    }

    function makePlain() {
      let name = "";
      for (let i = 0; i < 4; i++) {
        name += randomChar();
      }
      return name;
    }

    function makeWithSymbol(symbol) {
      let name = "";
      for (let i = 0; i < 3; i++) {
        name += randomChar();
      }

      const pos = Math.floor(Math.random() * 4);
      const arr = name.split("");
      arr.splice(pos, 0, symbol);
      return arr.join("");
    }

    function generateNames() {
      const mode = document.getElementById("mode").value;
      const results = document.getElementById("results");
      results.innerHTML = "";

      const used = new Set();

      while (used.size < 12) {
        let username = "";

        if (mode === "plain") {
          username = makePlain();
        } else if (mode === "dot") {
          username = makeWithSymbol(".");
        } else if (mode === "underscore") {
          username = makeWithSymbol("_");
        }

        used.add(username);
      }

      used.forEach(name => {
        const div = document.createElement("div");
        div.className = "name-card";
        div.textContent = name;
        results.appendChild(div);
      });
    }
  </script>

</body>
</html>
